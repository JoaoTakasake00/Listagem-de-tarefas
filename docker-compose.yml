services:
  app:
    build:
      context: .
      dockerfile: docker/apache/Dockerfile
    container_name: php_app
    restart: always
    ports:
      - "9000:80"
    volumes:
      - ./src:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: tasks_db
      DB_USER: user
      DB_PASSWORD: user
      AUTH_USERNAME: admin
      AUTH_PASSWORD_HASH: "$$2y$$10$$aXO7Z.XEEzJB18qDuj74JOsqNjlhBHaZDArI196q/XItqhcfjsOK6"
      AUTH_SECRET: "taskflow_auth_secret_change_me"
      TOKEN_EXPIRY: 3600
      REFRESH_TOKEN_SECRET: "taskflow_refresh_secret_change_me"
      JWT_SECRET: "taskflow_jwt_secret_2026_change_me"
      JWT_ALGORITHM: HS256
      JWT_ISSUER: taskflow-api
      JWT_EXPIRES_IN: 3600
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: tasks_db
      MYSQL_USER: user
      MYSQL_PASSWORD: user
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uuser", "-puser"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  db_data:
