<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lista de Tarefas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-dark text-white">
<div class="container-fluid container-md mt-4 mt-md-5 px-3 px-md-0">
  <h2 class="mb-4 text-center text-md-start">Lista de Tarefas</h2>
  <div id="feedback" class="alert d-none" role="alert"></div>
  <div class="card p-3 mb-4 text-dark">
    <form id="taskForm" novalidate>
      <input type="hidden" id="taskId">
      <input type="text" id="title" class="form-control mb-2" placeholder="Título" maxlength="120" required>
      <textarea id="description" class="form-control mb-2" placeholder="Descrição" rows="3" maxlength="1000"></textarea>
      <select id="status" class="form-select mb-3" required>
        <option value="pendente">Pendente</option>
        <option value="em andamento">Em andamento</option>
        <option value="concluída">Concluída</option>
      </select>
      <div class="d-flex flex-column flex-md-row gap-2">
        <button type="submit" id="btnSubmit" class="btn btn-primary w-100">Criar</button>
        <button type="button" id="btnCancel" class="btn btn-secondary w-100">Cancelar</button>
      </div>
    </form>
  </div>
  <div class="card p-3 text-dark">
    <div class="table-responsive">
      <table class="table table-hover w-100 text-nowrap">
        <thead>
          <tr>
            <th>ID</th>
            <th>Título</th>
            <th>Descrição</th>
            <th>Status</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tasksTable"></tbody>
      </table>
    </div>
  </div>
</div>
</body>
<script type="module" src="js/main.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</html>
